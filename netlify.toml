# Configuración de despliegue en Netlify
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirección para SPA (React Router): cualquier ruta sirve index.html.
# Sin esto, recargar /inscripcion o compartir el link daría 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
